name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  tofu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: "1.8.0"
      - name: fmt
        run: tofu fmt -check -recursive
      - name: init
        run: tofu init -backend=false
      - name: validate
        run: tofu validate

  # Advisory: surfaces security/compliance findings without blocking merges.
  # Flip soft_fail to false once the security backlog is addressed.
  checkov:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          soft_fail: true

  # Blocking: repo is currently secret-free; keep it that way.
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: TruffleHog
        run: |
          docker run --rm -v "$PWD:/repo" trufflesecurity/trufflehog:latest \
            filesystem /repo --only-verified --fail
