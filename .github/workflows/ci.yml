name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  tofu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: "1.8.0"
      - name: fmt
        run: tofu fmt -check -recursive
      - name: init
        run: tofu init -backend=false
      - name: validate
        run: tofu validate

  # Advisory: surfaces security/compliance findings without blocking merges.
  # Flip soft_fail to false once the security backlog is addressed.
  checkov:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          soft_fail: true

  # Blocking: repo is currently secret-free; keep it that way.
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: TruffleHog
        run: |
          docker run --rm -v "$PWD:/repo" trufflesecurity/trufflehog:latest \
            filesystem /repo --only-verified --fail

  # Blocking: gitleaks pattern scan alongside TruffleHog (defense in depth).
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: gitleaks
        run: |
          docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:latest \
            detect --source=/repo --no-git --redact --config=/repo/.gitleaks.toml

  # Advisory: Trivy IaC misconfig scan (complements Checkov).
  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Trivy config scan (advisory)
        run: |
          docker run --rm -v "$PWD:/repo" aquasec/trivy:latest \
            config /repo --severity HIGH,CRITICAL --exit-code 0

  # Advisory: tflint surfaces provider/lint issues without blocking.
  tflint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: terraform-linters/setup-tflint@v4
      - run: tflint --init
      - run: tflint -f compact || echo "::warning::tflint findings (advisory)"
